<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
        #overlay {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #A82008;
            font-family: monospace;
            font-size: 16px;
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
            z-index: 9999;

            /* Hidden by default */
            display: none;
        }

        .stat {
            margin: 2px 0;
        }

        iframe {
            width: 1905px;
            height: 896px;
            border: 0;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="stat">FPS: <span id="fps">0</span></div>
        <div class="stat">RAM: <span id="ram">0</span> MB</div>
    </div>

    <iframe
        src="https://example.com"
        allowfullscreen
        frameborder="0"
        referrerpolicy="strict-origin-when-cross-origin">
    </iframe>

    <script>
        const overlay = document.getElementById('overlay');
        const fpsEl = document.getElementById('fps');
        const ramEl = document.getElementById('ram');

        let overlayEnabled = false;

        // Toggle overlay when Ctrl is pressed
        document.addEventListener("keydown", (event) => {
            if (event.key === "CTRL" && !event.repeat) {
                overlayEnabled = !overlayEnabled;
                overlay.style.display = overlayEnabled ? "block" : "none";
            }
        });

        let frames = 0;
        let lastFpsUpdate = performance.now();

        function updateOverlay(now) {
            frames++;

            if (overlayEnabled) {
                if (now - lastFpsUpdate >= 500) {
                    const fps = Math.round((frames * 1000) / (now - lastFpsUpdate));
                    fpsEl.textContent = fps;
                    frames = 0;
                    lastFpsUpdate = now;
                }

                if (performance.memory) {
                    const usedMB = (performance.memory.usedJSHeapSize / 1024 / 1024).toFixed(2);
                    ramEl.textContent = usedMB;
                } else {
                    ramEl.textContent = "N/A (Firefox/Safari)";
                }
            }

            requestAnimationFrame(updateOverlay);
        }

        requestAnimationFrame(updateOverlay);
    </script>

</body>
</html>
