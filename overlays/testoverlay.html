<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
        
        overlay {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #A82008;
            font-family: monospace;
            font-size: 16px;
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
            z-index: 9999;

            
            display: none;
        }

        .stat {
            margin: 2px 0;
        }

        
        toggle {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 10000;
            background: rgba(0, 0, 0, 0.7);
            color: #A82008;
            border: 1px solid #A82008;
            border-radius: 5px;
            padding: 8px 12px;
            font-family: monospace;
            cursor: pointer;
        }

        toggle:hover {
            background: rgba(30, 30, 30, 0.9);
        }

        iframe {
            width: 1905px;
            height: 896px;
            border: 0;
        }
    </style>
</head>
<body>

    
    <div id="overlay">
        <div class="stat">FPS: <span id="fps">0</span></div>
        <div class="stat">RAM: <span id="ram">0</span> MB</div>
    </div>

    
    <button id="toggle">Show Stats</button>

    
    <iframe
        src="https://example.com"
        allowfullscreen
        frameborder="0"
        referrerpolicy="strict-origin-when-cross-origin">
    </iframe>

    <script>
        const overlay = document.getElementById('overlay');
        const toggle = document.getElementById('toggleBtn');
        const fpsEl = document.getElementById('fps');
        const ramEl = document.getElementById('ram');

        let overlayEnabled = false;

       
        toggle.addEventListener('click', () => {
            overlayEnabled = !overlayEnabled;

            overlay.style.display = overlayEnabled ? 'block' : 'none';
            toggleBtn.textContent = overlayEnabled ? 'Hide Stats' : 'Show Stats';
        });

        let frames = 0;
        let lastFpsUpdate = performance.now();

        function updateOverlay(now) {
            frames++;

            if (overlayEnabled) {
                if (now - lastFpsUpdate >= 500) {
                    const fps = Math.round((frames * 1000) / (now - lastFpsUpdate));
                    fpsEl.textContent = fps;
                    frames = 0;
                    lastFpsUpdate = now;
                }

                if (performance.memory) {
                    const usedMB = (
                        performance.memory.usedJSHeapSize / 1024 / 1024
                    ).toFixed(2);
                    ramEl.textContent = usedMB;
                } else {
                    ramEl.textContent = "N/A";
                }
            }

            requestAnimationFrame(updateOverlay);
        }

        requestAnimationFrame(updateOverlay);
    </script>

</body>
</html>
