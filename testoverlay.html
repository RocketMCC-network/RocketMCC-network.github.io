<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
      
        #overlay {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #A82008;
            font-family: monospace;
            font-size: 16px;
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
            z-index: 9999;
        }

        .stat {
            margin: 2px 0;
        }

        iframe {
            width: 1905px;
            height: 920px;
            border: 0;
        }
    </style>
</head>
<body>

    
    <div id="overlay">
        <div class="stat">FPS: <span id="fps">0</span></div>
        <div class="stat">RAM: <span id="ram">0</span> MB</div>
    </div>

    
    <iframe
        src="https://example.com"
        allowfullscreen
        frameborder="0"
        referrerpolicy="strict-origin-when-cross-origin">
    </iframe>

    <script>
        const fpsEl = document.getElementById('fps');
        const ramEl = document.getElementById('ram');

        let lastTime = performance.now();
        let frames = 0;
        let lastFpsUpdate = 0;

        function updateOverlay(now) {
            lastTime = now;
            frames++;

            if (now - lastFpsUpdate >= 500) {
                const fps = Math.round((frames * 1000) / (now - lastFpsUpdate));
                fpsEl.textContent = fps;
                frames = 0;
                lastFpsUpdate = now;
            }

            if (performance.memory) {
                const usedMB = (performance.memory.usedJSHeapSize / 1024 / 1024).toFixed(2);
                ramEl.textContent = usedMB;
            } else {
                ramEl.textContent = "N/A (Firefox/Safari)";
            }

            requestAnimationFrame(updateOverlay);
        }

        requestAnimationFrame(updateOverlay);
    </script>

</body>
</html>
